<svg width="1200" height="360" viewBox="0 0 1200 360" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="360"><stop stop-color="#020617"/><stop offset="1" stop-color="#0f172a"/></linearGradient>
    <linearGradient id="g1" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#38bdf8"/><stop offset="1" stop-color="#2563eb"/></linearGradient>
    <linearGradient id="g2" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#a855f7"/><stop offset="1" stop-color="#7c3aed"/></linearGradient>
    <linearGradient id="g3" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#22c55e"/><stop offset="1" stop-color="#16a34a"/></linearGradient>
    <linearGradient id="g4" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#f59e0b"/><stop offset="1" stop-color="#f97316"/></linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <style>
      @keyframes rise { 0%,100%{ transform:translateY(0)} 50%{ transform:translateY(-9px)} }
      @keyframes glow { 0%,100%{opacity:.6} 50%{opacity:1} }
      .card{ animation: rise 5s ease-in-out infinite; transform-box:fill-box; transform-origin:center; }
      .card:nth-of-type(2){animation-delay:.5s}.card:nth-of-type(3){animation-delay:1s}.card:nth-of-type(4){animation-delay:1.5s}
      .dot{animation:glow 2s ease-in-out infinite; filter:url(#glow)}
      text{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace}
    </style>
  </defs>
  <rect width="1200" height="360" rx="28" fill="url(#bg)"/>
  <text x="600" y="45" text-anchor="middle" fill="#f8fafc" font-size="26" font-weight="900">LIVE IMPACT MAP</text>
  <text x="600" y="74" text-anchor="middle" fill="#94a3b8" font-size="14">Real products, real domains, real deployment proof</text>

  <g class="card">
    <rect x="60" y="115" width="250" height="155" rx="22" fill="#020617" stroke="url(#g1)" stroke-width="2"/>
    <circle class="dot" cx="92" cy="150" r="8" fill="#38bdf8"/>
    <text x="185" y="155" text-anchor="middle" fill="#38bdf8" font-size="20" font-weight="900">LabLink</text>
    <text x="185" y="190" text-anchor="middle" fill="#e5e7eb" font-size="13">Inventory + RBAC</text>
    <text x="185" y="216" text-anchor="middle" fill="#94a3b8" font-size="12">Supabase · QR · Analytics</text>
    <text x="185" y="246" text-anchor="middle" fill="#22c55e" font-size="13" font-weight="800">LIVE</text>
  </g>

  <g class="card">
    <rect x="340" y="115" width="250" height="155" rx="22" fill="#020617" stroke="url(#g2)" stroke-width="2"/>
    <circle class="dot" cx="372" cy="150" r="8" fill="#a855f7"/>
    <text x="465" y="155" text-anchor="middle" fill="#c084fc" font-size="20" font-weight="900">MediLink</text>
    <text x="465" y="190" text-anchor="middle" fill="#e5e7eb" font-size="13">AI Healthcare</text>
    <text x="465" y="216" text-anchor="middle" fill="#94a3b8" font-size="12">Appointments · Guidance</text>
    <text x="465" y="246" text-anchor="middle" fill="#22c55e" font-size="13" font-weight="800">LIVE</text>
  </g>

  <g class="card">
    <rect x="620" y="115" width="250" height="155" rx="22" fill="#020617" stroke="url(#g3)" stroke-width="2"/>
    <circle class="dot" cx="652" cy="150" r="8" fill="#22c55e"/>
    <text x="745" y="155" text-anchor="middle" fill="#4ade80" font-size="20" font-weight="900">EnergiSync</text>
    <text x="745" y="190" text-anchor="middle" fill="#e5e7eb" font-size="13">IoT Energy SaaS</text>
    <text x="745" y="216" text-anchor="middle" fill="#94a3b8" font-size="12">ESP32 · MQTT · AES</text>
    <text x="745" y="246" text-anchor="middle" fill="#fbbf24" font-size="13" font-weight="800">SaaS MODEL</text>
  </g>

  <g class="card">
    <rect x="900" y="115" width="250" height="155" rx="22" fill="#020617" stroke="url(#g4)" stroke-width="2"/>
    <circle class="dot" cx="932" cy="150" r="8" fill="#f59e0b"/>
    <text x="1025" y="155" text-anchor="middle" fill="#fbbf24" font-size="20" font-weight="900">MarkOne AI</text>
    <text x="1025" y="190" text-anchor="middle" fill="#e5e7eb" font-size="13">RAG AI Agent</text>
    <text x="1025" y="216" text-anchor="middle" fill="#94a3b8" font-size="12">LangChain · Gemini · NLP</text>
    <text x="1025" y="246" text-anchor="middle" fill="#22c55e" font-size="13" font-weight="800">70% EFFORT ↓</text>
  </g>

  <path d="M185 292 C360 330, 840 330, 1025 292" stroke="#334155" stroke-width="2" stroke-dasharray="8 9" fill="none"/>
  <text x="600" y="325" text-anchor="middle" fill="#cbd5e1" font-size="14">Product proof beats profile claims — every card points to a real domain you build for.</text>
</svg>
