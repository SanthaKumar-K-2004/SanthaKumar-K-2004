<svg width="1400" height="620" viewBox="0 0 1400 620" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Spiderman Obsidian-Crimson Space Radial Gradient -->
    <radialGradient id="space" cx="50%" cy="42%" r="75%">
      <stop offset="0" stop-color="#1f0407"/>
      <stop offset="0.4" stop-color="#070a12"/>
      <stop offset="1" stop-color="#020306"/>
    </radialGradient>
    
    <!-- Spidey Red, Blue, and Gold Linear Gradients -->
    <linearGradient id="red" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#f43f5e"/><stop offset="1" stop-color="#be123c"/></linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#3b82f6"/><stop offset="1" stop-color="#1d4ed8"/></linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#fbbf24"/><stop offset="1" stop-color="#d97706"/></linearGradient>
    <linearGradient id="line" x1="160" y1="0" x2="1240" y2="620" gradientUnits="userSpaceOnUse"><stop stop-color="#ef4444"/><stop offset="0.5" stop-color="#e2e8f0"/><stop offset="1" stop-color="#3b82f6"/></linearGradient>
    
    <!-- Glowing Filters -->
    <filter id="glow" x="-80%" y="-80%" width="260%" height="260%"><feGaussianBlur stdDeviation="7" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="soft" x="-40%" y="-40%" width="180%" height="180%"><feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#ef4444" flood-opacity="0.25"/></filter>
    
    <pattern id="grid" width="56" height="56" patternUnits="userSpaceOnUse"><path d="M56 0H0V56" stroke="#1e293b" stroke-width="1" opacity=".35"/></pattern>

    <style>
      text{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace}
      @keyframes orbit{to{transform:rotate(360deg)}}
      @keyframes orbitR{to{transform:rotate(-360deg)}}
      @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
      @keyframes floatSmall{0%,100%{transform:translateY(0) translateX(0)}50%{transform:translateY(-5px) translateX(3px)}}
      @keyframes dash{to{stroke-dashoffset:-360}}
      @keyframes pulse{0%,100%{opacity:.55;transform:scale(1)}50%{opacity:1;transform:scale(1.05)}}
      @keyframes shimmer{0%{transform:translateX(-1500px)}100%{transform:translateX(1500px)}}
      @keyframes type{0%,10%{opacity:0}25%,90%{opacity:1}100%{opacity:0}}
      
      .orbit{animation:orbit 34s linear infinite;transform-origin:700px 320px}
      .orbitR{animation:orbitR 45s linear infinite;transform-origin:700px 320px}
      .card{animation:float 5.8s ease-in-out infinite;filter:url(#soft)}
      .card2{animation:float 5.8s ease-in-out infinite reverse;filter:url(#soft)}
      .dash{stroke-dasharray:16 14;animation:dash 9s linear infinite}
      .pulse{animation:pulse 3s ease-in-out infinite;transform-box:fill-box;transform-origin:center;filter:url(#glow)}
      .star{animation:floatSmall 4s ease-in-out infinite;opacity:.75}
      .shimmer{animation:shimmer 6s linear infinite}
      .t1{animation:type 6s ease-in-out infinite}.t2{animation:type 6s ease-in-out infinite;animation-delay:1.5s}.t3{animation:type 6s ease-in-out infinite;animation-delay:3s}.t4{animation:type 6s ease-in-out infinite;animation-delay:4.5s}
    </style>
  </defs>

  <!-- Background Space -->
  <rect width="1400" height="620" rx="34" fill="url(#space)"/>
  
  <!-- Subtle Grid Overlay -->
  <rect width="1400" height="620" rx="34" fill="url(#grid)"/>
  
  <rect class="shimmer" x="0" y="0" width="190" height="620" fill="url(#line)" opacity=".055"/>

  <!-- Floating Star Elements -->
  <g opacity=".8">
    <circle class="star" cx="145" cy="82" r="2" fill="#f43f5e"/><circle class="star" cx="1160" cy="88" r="2.5" fill="#3b82f6" style="animation-delay:.7s"/><circle class="star" cx="1280" cy="460" r="2" fill="#fbbf24" style="animation-delay:1.4s"/><circle class="star" cx="220" cy="510" r="2.2" fill="#ffffff" style="animation-delay:2.1s"/><circle class="star" cx="710" cy="92" r="2" fill="#f43f5e" style="animation-delay:1s"/>
  </g>

  <!-- Title Text -->
  <text x="700" y="58" text-anchor="middle" fill="#f8fafc" font-size="34" font-weight="900">SANTHAKUMAR K — PROJECT UNIVERSE</text>
  <text x="700" y="90" text-anchor="middle" fill="#cbd5e1" font-size="15">AI Agents • Claude MCP • Full-Stack SaaS • Android • IoT • GovTech • Healthcare</text>

  <!-- Static Concentric Orbits (Circles to avoid wobbly rotation) -->
  <circle cx="700" cy="320" r="280" stroke="url(#line)" stroke-width="1.2" stroke-dasharray="8 10" fill="none" opacity="0.6"/>
  <circle cx="700" cy="320" r="180" stroke="#fbbf24" stroke-width="1" stroke-dasharray="6 8" fill="none" opacity="0.5"/>

  <!-- Animated Orbiting Dots (Correctly rotating around center) -->
  <g class="orbit" opacity="0.8">
    <circle cx="980" cy="320" r="6" fill="#f43f5e" filter="url(#glow)"/>
  </g>
  <g class="orbitR" opacity="0.8">
    <circle cx="700" cy="140" r="5" fill="#3b82f6" filter="url(#glow)"/>
  </g>

  <!-- Glowing Connection Rays -->
  <path class="dash" d="M700 320 C500 240 380 200 235 196" stroke="#3b82f6" stroke-width="1.5" fill="none" opacity=".6"/>
  <path class="dash" d="M700 320 C900 240 1020 200 1165 201" stroke="#f43f5e" stroke-width="1.5" fill="none" opacity=".6"/>
  <path class="dash" d="M700 320 C500 400 380 440 247 451" stroke="#3b82f6" stroke-width="1.5" fill="none" opacity=".6"/>
  <path class="dash" d="M700 320 C900 400 1020 440 1165 443" stroke="#f43f5e" stroke-width="1.5" fill="none" opacity=".6"/>
  <path class="dash" d="M700 320 L700 152" stroke="#ffffff" stroke-width="1.5" fill="none" opacity=".6"/>
  <path class="dash" d="M700 320 L700 536" stroke="#fbbf24" stroke-width="1.5" fill="none" opacity=".6"/>

  <!-- Centered Spidey Core -->
  <g class="pulse">
    <!-- Web Core Circle Borders -->
    <circle cx="700" cy="320" r="88" fill="#020306" stroke="url(#red)" stroke-width="4"/>
    <circle cx="700" cy="320" r="62" fill="#090d16" stroke="#3b82f6" stroke-width="1.5" opacity=".9"/>
    
    <!-- Stylized Vector Spider Emblem Watermark -->
    <g opacity="0.25" fill="#f43f5e">
      <!-- Body/Head -->
      <ellipse cx="700" cy="320" rx="9" ry="15" />
      <circle cx="700" cy="301" r="5" />
      <!-- Left Legs -->
      <path d="M693 313 Q678 305 670 288 Q678 302 693 314 Z" />
      <path d="M692 318 Q673 315 664 306 Q673 312 692 319 Z" />
      <path d="M692 322 Q673 327 666 338 Q674 329 692 323 Z" />
      <path d="M693 327 Q678 338 672 354 Q680 340 693 328 Z" />
      <!-- Right Legs -->
      <path d="M707 313 Q722 305 730 288 Q722 302 707 314 Z" />
      <path d="M708 318 Q727 315 736 306 Q727 312 708 319 Z" />
      <path d="M708 322 Q727 327 734 338 Q726 329 708 323 Z" />
      <path d="M707 327 Q722 338 728 354 Q720 340 707 328 Z" />
    </g>

    <!-- Core Text Details -->
    <text x="700" y="306" text-anchor="middle" fill="#e0f2fe" font-size="22" font-weight="900">BUILDER</text>
    <text x="700" y="333" text-anchor="middle" fill="#cbd5e1" font-size="13">Ship • Learn • Improve</text>
    
    <!-- Core Rotating Stats -->
    <text class="t1" x="700" y="360" text-anchor="middle" fill="#f87171" font-size="12">5+ Live Products</text>
    <text class="t2" x="700" y="360" text-anchor="middle" fill="#60a5fa" font-size="12">1+ Year Experience</text>
    <text class="t3" x="700" y="360" text-anchor="middle" fill="#fbbf24" font-size="12">10/10 CGPA</text>
    <text class="t4" x="700" y="360" text-anchor="middle" fill="#f472b6" font-size="12">QS Top 10 Finalist</text>
  </g>

  <!-- Project Cards Layout -->
  
  <!-- Card 1: ContextX Intelligence -->
  <g class="card">
    <rect x="70" y="135" width="330" height="122" rx="24" fill="#020306" stroke="url(#blue)" stroke-width="2"/>
    <text x="235" y="174" text-anchor="middle" fill="#60a5fa" font-size="22" font-weight="900">ContextX Intelligence</text>
    <text x="235" y="202" text-anchor="middle" fill="#e5e7eb" font-size="13">Claude MCP + Token Saver</text>
    <text x="235" y="228" text-anchor="middle" fill="#94a3b8" font-size="12">Rust · Local-first · Usage Monitor</text>
  </g>

  <!-- Card 2: LinkedIn MCP Zero -->
  <g class="card2">
    <rect x="1000" y="140" width="330" height="122" rx="24" fill="#020306" stroke="url(#red)" stroke-width="2"/>
    <text x="1165" y="179" text-anchor="middle" fill="#f87171" font-size="22" font-weight="900">LinkedIn MCP Zero</text>
    <text x="1165" y="207" text-anchor="middle" fill="#e5e7eb" font-size="13">Jobs • Resume • Matching</text>
    <text x="1165" y="233" text-anchor="middle" fill="#94a3b8" font-size="12">Python · Claude Desktop · Cursor</text>
  </g>

  <!-- Card 3: TuitionOS -->
  <g class="card2">
    <rect x="82" y="390" width="330" height="122" rx="24" fill="#020306" stroke="url(#blue)" stroke-width="2"/>
    <text x="247" y="429" text-anchor="middle" fill="#60a5fa" font-size="22" font-weight="900">TuitionOS</text>
    <text x="247" y="457" text-anchor="middle" fill="#e5e7eb" font-size="13">Tuition Center Management</text>
    <text x="247" y="483" text-anchor="middle" fill="#94a3b8" font-size="12">Kotlin · Jetpack Compose · Supabase</text>
  </g>

  <!-- Card 4: Jan-Seva AI -->
  <g class="card">
    <rect x="1000" y="382" width="330" height="122" rx="24" fill="#020306" stroke="url(#gold)" stroke-width="2"/>
    <text x="1165" y="421" text-anchor="middle" fill="#fbbf24" font-size="22" font-weight="900">Jan-Seva AI</text>
    <text x="1165" y="449" text-anchor="middle" fill="#e5e7eb" font-size="13">Citizen Scheme Assistant</text>
    <text x="1165" y="475" text-anchor="middle" fill="#94a3b8" font-size="12">GovTech · RAG · Source Verification</text>
  </g>

  <!-- Card 5: SRE-Bench -->
  <g class="card">
    <rect x="535" y="104" width="330" height="96" rx="22" fill="#020306" stroke="url(#blue)" stroke-width="2"/>
    <text x="700" y="143" text-anchor="middle" fill="#60a5fa" font-size="21" font-weight="900">SRE-Bench</text>
    <text x="700" y="170" text-anchor="middle" fill="#cbd5e1" font-size="12">AI Incident Response Simulator</text>
  </g>

  <!-- Card 6: LabLink + MediLink -->
  <g class="card2">
    <rect x="535" y="488" width="330" height="96" rx="22" fill="#020306" stroke="url(#red)" stroke-width="2"/>
    <text x="700" y="527" text-anchor="middle" fill="#f87171" font-size="21" font-weight="900">LabLink + MediLink</text>
    <text x="700" y="554" text-anchor="middle" fill="#cbd5e1" font-size="12">Live Inventory + Healthcare Products</text>
  </g>
</svg>
