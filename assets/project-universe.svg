<svg width="1400" height="620" viewBox="0 0 1400 620" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="space" cx="50%" cy="42%" r="75%">
      <stop offset="0" stop-color="#172554"/>
      <stop offset="0.38" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#020617"/>
    </radialGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#67e8f9"/><stop offset="1" stop-color="#2563eb"/></linearGradient>
    <linearGradient id="purple" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#f0abfc"/><stop offset="1" stop-color="#7c3aed"/></linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#86efac"/><stop offset="1" stop-color="#16a34a"/></linearGradient>
    <linearGradient id="orange" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#fde68a"/><stop offset="1" stop-color="#f97316"/></linearGradient>
    <linearGradient id="pink" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#f9a8d4"/><stop offset="1" stop-color="#db2777"/></linearGradient>
    <linearGradient id="line" x1="160" y1="0" x2="1240" y2="620" gradientUnits="userSpaceOnUse"><stop stop-color="#38bdf8"/><stop offset="0.5" stop-color="#a855f7"/><stop offset="1" stop-color="#22c55e"/></linearGradient>
    <filter id="glow" x="-80%" y="-80%" width="260%" height="260%"><feGaussianBlur stdDeviation="7" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="soft" x="-60%" y="-60%" width="220%" height="220%"><feDropShadow dx="0" dy="0" stdDeviation="10" flood-color="#38bdf8" flood-opacity="0.35"/></filter>
    <pattern id="grid" width="56" height="56" patternUnits="userSpaceOnUse"><path d="M56 0H0V56" stroke="#1e293b" stroke-width="1" opacity=".45"/></pattern>
    <style>
      text{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace}
      @keyframes orbit{to{transform:rotate(360deg)}}
      @keyframes orbitR{to{transform:rotate(-360deg)}}
      @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-16px)}}
      @keyframes floatSmall{0%,100%{transform:translateY(0) translateX(0)}50%{transform:translateY(-8px) translateX(5px)}}
      @keyframes dash{to{stroke-dashoffset:-360}}
      @keyframes pulse{0%,100%{opacity:.55;transform:scale(1)}50%{opacity:1;transform:scale(1.055)}}
      @keyframes shimmer{0%{transform:translateX(-1500px)}100%{transform:translateX(1500px)}}
      @keyframes type{0%,10%{opacity:0}25%,90%{opacity:1}100%{opacity:0}}
      .orbit{animation:orbit 34s linear infinite;transform-origin:700px 320px}
      .orbitR{animation:orbitR 45s linear infinite;transform-origin:700px 320px}
      .card{animation:float 5.8s ease-in-out infinite;transform-box:fill-box;transform-origin:center;filter:url(#soft)}
      .card2{animation:float 6.8s ease-in-out infinite reverse;transform-box:fill-box;transform-origin:center;filter:url(#soft)}
      .dash{stroke-dasharray:16 14;animation:dash 9s linear infinite}
      .pulse{animation:pulse 3s ease-in-out infinite;transform-box:fill-box;transform-origin:center;filter:url(#glow)}
      .star{animation:floatSmall 4s ease-in-out infinite;opacity:.75}
      .shimmer{animation:shimmer 6s linear infinite}
      .t1{animation:type 6s ease-in-out infinite}.t2{animation:type 6s ease-in-out infinite;animation-delay:1.5s}.t3{animation:type 6s ease-in-out infinite;animation-delay:3s}.t4{animation:type 6s ease-in-out infinite;animation-delay:4.5s}
    </style>
  </defs>

  <rect width="1400" height="620" rx="34" fill="url(#space)"/>
  <rect width="1400" height="620" rx="34" fill="url(#grid)"/>
  <rect class="shimmer" x="0" y="0" width="190" height="620" fill="url(#line)" opacity=".055"/>

  <g opacity=".8">
    <circle class="star" cx="145" cy="82" r="2" fill="#bae6fd"/><circle class="star" cx="1160" cy="88" r="2.5" fill="#ddd6fe" style="animation-delay:.7s"/><circle class="star" cx="1280" cy="460" r="2" fill="#bbf7d0" style="animation-delay:1.4s"/><circle class="star" cx="220" cy="510" r="2.2" fill="#fde68a" style="animation-delay:2.1s"/><circle class="star" cx="710" cy="92" r="2" fill="#f0abfc" style="animation-delay:1s"/>
  </g>

  <text x="700" y="58" text-anchor="middle" fill="#f8fafc" font-size="34" font-weight="900">SANTHAKUMAR K — PROJECT UNIVERSE</text>
  <text x="700" y="90" text-anchor="middle" fill="#cbd5e1" font-size="15">AI Agents • Claude MCP • Full-Stack SaaS • Android • IoT • GovTech • Healthcare</text>

  <g class="orbit" opacity=".75">
    <ellipse cx="700" cy="320" rx="405" ry="142" stroke="url(#line)" stroke-width="1.5" stroke-dasharray="10 12"/>
    <circle cx="1095" cy="320" r="6" fill="#38bdf8" filter="url(#glow)"/>
  </g>
  <g class="orbitR" opacity=".65">
    <ellipse cx="700" cy="320" rx="300" ry="218" stroke="#a855f7" stroke-width="1.2" stroke-dasharray="7 11"/>
    <circle cx="700" cy="102" r="5" fill="#a855f7" filter="url(#glow)"/>
  </g>

  <path class="dash" d="M700 320 C505 150 350 152 235 185" stroke="url(#line)" stroke-width="2" fill="none" opacity=".8"/>
  <path class="dash" d="M700 320 C900 145 1048 155 1165 190" stroke="url(#line)" stroke-width="2" fill="none" opacity=".8"/>
  <path class="dash" d="M700 320 C510 445 375 457 240 442" stroke="url(#line)" stroke-width="2" fill="none" opacity=".8"/>
  <path class="dash" d="M700 320 C900 460 1040 460 1162 435" stroke="url(#line)" stroke-width="2" fill="none" opacity=".8"/>
  <path class="dash" d="M700 320 C670 190 670 150 700 123" stroke="#a855f7" stroke-width="2" fill="none" opacity=".75"/>
  <path class="dash" d="M700 320 C720 460 720 500 700 525" stroke="#22c55e" stroke-width="2" fill="none" opacity=".75"/>

  <g class="pulse">
    <circle cx="700" cy="320" r="88" fill="#020617" stroke="url(#line)" stroke-width="4"/>
    <circle cx="700" cy="320" r="60" fill="#0f172a" stroke="#38bdf8" stroke-width="1.5" opacity=".9"/>
    <text x="700" y="306" text-anchor="middle" fill="#e0f2fe" font-size="22" font-weight="900">BUILDER</text>
    <text x="700" y="333" text-anchor="middle" fill="#c4b5fd" font-size="13">Ship • Learn • Improve</text>
    <text class="t1" x="700" y="360" text-anchor="middle" fill="#86efac" font-size="12">5+ Live Products</text>
    <text class="t2" x="700" y="360" text-anchor="middle" fill="#67e8f9" font-size="12">1+ Year Experience</text>
    <text class="t3" x="700" y="360" text-anchor="middle" fill="#fde68a" font-size="12">10/10 CGPA</text>
    <text class="t4" x="700" y="360" text-anchor="middle" fill="#f0abfc" font-size="12">QS Top 10 Finalist</text>
  </g>

  <g class="card">
    <rect x="70" y="135" width="330" height="122" rx="24" fill="#020617" stroke="url(#blue)" stroke-width="2"/>
    <text x="235" y="174" text-anchor="middle" fill="#67e8f9" font-size="22" font-weight="900">ContextX Intelligence</text>
    <text x="235" y="202" text-anchor="middle" fill="#e5e7eb" font-size="13">Claude MCP + Token Saver</text>
    <text x="235" y="228" text-anchor="middle" fill="#94a3b8" font-size="12">Rust · Local-first · Usage Monitor</text>
  </g>

  <g class="card2">
    <rect x="1000" y="140" width="330" height="122" rx="24" fill="#020617" stroke="url(#purple)" stroke-width="2"/>
    <text x="1165" y="179" text-anchor="middle" fill="#f0abfc" font-size="22" font-weight="900">LinkedIn MCP Zero</text>
    <text x="1165" y="207" text-anchor="middle" fill="#e5e7eb" font-size="13">Jobs • Resume • Matching</text>
    <text x="1165" y="233" text-anchor="middle" fill="#94a3b8" font-size="12">Python · Claude Desktop · Cursor</text>
  </g>

  <g class="card2">
    <rect x="82" y="390" width="330" height="122" rx="24" fill="#020617" stroke="url(#green)" stroke-width="2"/>
    <text x="247" y="429" text-anchor="middle" fill="#86efac" font-size="22" font-weight="900">TuitionOS</text>
    <text x="247" y="457" text-anchor="middle" fill="#e5e7eb" font-size="13">Tuition Center Management</text>
    <text x="247" y="483" text-anchor="middle" fill="#94a3b8" font-size="12">Kotlin · Jetpack Compose · Supabase</text>
  </g>

  <g class="card">
    <rect x="1000" y="382" width="330" height="122" rx="24" fill="#020617" stroke="url(#orange)" stroke-width="2"/>
    <text x="1165" y="421" text-anchor="middle" fill="#fde68a" font-size="22" font-weight="900">Jan-Seva AI</text>
    <text x="1165" y="449" text-anchor="middle" fill="#e5e7eb" font-size="13">Citizen Scheme Assistant</text>
    <text x="1165" y="475" text-anchor="middle" fill="#94a3b8" font-size="12">GovTech · RAG · Source Verification</text>
  </g>

  <g class="card">
    <rect x="535" y="104" width="330" height="96" rx="22" fill="#020617" stroke="url(#pink)" stroke-width="2"/>
    <text x="700" y="143" text-anchor="middle" fill="#f9a8d4" font-size="21" font-weight="900">SRE-Bench</text>
    <text x="700" y="170" text-anchor="middle" fill="#cbd5e1" font-size="12">AI Incident Response Simulator</text>
  </g>

  <g class="card2">
    <rect x="535" y="488" width="330" height="96" rx="22" fill="#020617" stroke="url(#green)" stroke-width="2"/>
    <text x="700" y="527" text-anchor="middle" fill="#86efac" font-size="21" font-weight="900">LabLink + MediLink</text>
    <text x="700" y="554" text-anchor="middle" fill="#cbd5e1" font-size="12">Live Inventory + Healthcare Products</text>
  </g>
</svg>
