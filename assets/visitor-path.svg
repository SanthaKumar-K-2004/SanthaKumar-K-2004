<svg width="1400" height="430" viewBox="0 0 1400 430" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1400" y2="430"><stop stop-color="#020617"/><stop offset=".55" stop-color="#0f172a"/><stop offset="1" stop-color="#111827"/></linearGradient>
    <linearGradient id="g" x1="0" y1="0" x2="1400" y2="0"><stop stop-color="#38bdf8"/><stop offset=".5" stop-color="#a855f7"/><stop offset="1" stop-color="#22c55e"/></linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="6" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <style>
      text{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace}
      @keyframes dash{to{stroke-dashoffset:-420}}
      @keyframes blink{0%,100%{opacity:.35}50%{opacity:1}}
      @keyframes lift{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
      @keyframes scan{0%{transform:translateX(-500px)}100%{transform:translateX(1500px)}}
      .flow{stroke-dasharray:18 14;animation:dash 8s linear infinite}
      .node{animation:blink 2.3s ease-in-out infinite;filter:url(#glow)}
      .card{animation:lift 5s ease-in-out infinite;transform-box:fill-box;transform-origin:center}
      .card:nth-of-type(2){animation-delay:.5s}.card:nth-of-type(3){animation-delay:1s}.card:nth-of-type(4){animation-delay:1.5s}
      .scan{animation:scan 5s linear infinite}
    </style>
  </defs>
  <rect width="1400" height="430" rx="30" fill="url(#bg)"/>
  <rect class="scan" x="0" y="0" width="180" height="430" fill="url(#g)" opacity=".06"/>
  <text x="700" y="52" text-anchor="middle" fill="#f8fafc" font-size="30" font-weight="900">VISITOR INTERACTION PATH</text>
  <text x="700" y="82" text-anchor="middle" fill="#94a3b8" font-size="14">Guide recruiters, users, founders, and developers to the right proof in one glance</text>

  <path class="flow" d="M190 215 H1210" stroke="url(#g)" stroke-width="4" fill="none" filter="url(#glow)"/>
  <circle class="node" cx="190" cy="215" r="11" fill="#38bdf8"/><circle class="node" cx="455" cy="215" r="11" fill="#a855f7" style="animation-delay:.4s"/><circle class="node" cx="720" cy="215" r="11" fill="#22c55e" style="animation-delay:.8s"/><circle class="node" cx="985" cy="215" r="11" fill="#f59e0b" style="animation-delay:1.2s"/><circle class="node" cx="1210" cy="215" r="11" fill="#ec4899" style="animation-delay:1.6s"/>

  <g class="card">
    <rect x="70" y="145" width="240" height="140" rx="22" fill="#020617" stroke="#38bdf8" stroke-width="2"/>
    <text x="190" y="183" text-anchor="middle" fill="#67e8f9" font-size="19" font-weight="900">Recruiter</text>
    <text x="190" y="216" text-anchor="middle" fill="#e5e7eb" font-size="12">See experience</text>
    <text x="190" y="239" text-anchor="middle" fill="#94a3b8" font-size="11">1+ yr · 5+ live products</text>
    <text x="190" y="263" text-anchor="middle" fill="#22c55e" font-size="12" font-weight="800">→ Portfolio / LinkedIn</text>
  </g>

  <g class="card">
    <rect x="335" y="145" width="240" height="140" rx="22" fill="#020617" stroke="#a855f7" stroke-width="2"/>
    <text x="455" y="183" text-anchor="middle" fill="#d8b4fe" font-size="19" font-weight="900">AI Builder</text>
    <text x="455" y="216" text-anchor="middle" fill="#e5e7eb" font-size="12">Explore MCP tools</text>
    <text x="455" y="239" text-anchor="middle" fill="#94a3b8" font-size="11">ContextX · LinkedIn MCP</text>
    <text x="455" y="263" text-anchor="middle" fill="#22c55e" font-size="12" font-weight="800">→ GitHub repos</text>
  </g>

  <g class="card">
    <rect x="600" y="145" width="240" height="140" rx="22" fill="#020617" stroke="#22c55e" stroke-width="2"/>
    <text x="720" y="183" text-anchor="middle" fill="#86efac" font-size="19" font-weight="900">Institution</text>
    <text x="720" y="216" text-anchor="middle" fill="#e5e7eb" font-size="12">Try operations tools</text>
    <text x="720" y="239" text-anchor="middle" fill="#94a3b8" font-size="11">LabLink · TuitionOS</text>
    <text x="720" y="263" text-anchor="middle" fill="#22c55e" font-size="12" font-weight="800">→ Live demos</text>
  </g>

  <g class="card">
    <rect x="865" y="145" width="240" height="140" rx="22" fill="#020617" stroke="#f59e0b" stroke-width="2"/>
    <text x="985" y="183" text-anchor="middle" fill="#fde68a" font-size="19" font-weight="900">Impact Partner</text>
    <text x="985" y="216" text-anchor="middle" fill="#e5e7eb" font-size="12">See social products</text>
    <text x="985" y="239" text-anchor="middle" fill="#94a3b8" font-size="11">Jan-Seva · MediLink</text>
    <text x="985" y="263" text-anchor="middle" fill="#22c55e" font-size="12" font-weight="800">→ Collaborate</text>
  </g>

  <g class="card">
    <rect x="1130" y="145" width="240" height="140" rx="22" fill="#020617" stroke="#ec4899" stroke-width="2"/>
    <text x="1250" y="183" text-anchor="middle" fill="#f9a8d4" font-size="19" font-weight="900">Founder / SMB</text>
    <text x="1250" y="216" text-anchor="middle" fill="#e5e7eb" font-size="12">Need automation?</text>
    <text x="1250" y="239" text-anchor="middle" fill="#94a3b8" font-size="11">BizBot · MarkOne AI</text>
    <text x="1250" y="263" text-anchor="middle" fill="#22c55e" font-size="12" font-weight="800">→ Email / LinkedIn</text>
  </g>

  <text x="700" y="354" text-anchor="middle" fill="#cbd5e1" font-size="14">README images cannot run JavaScript on GitHub, so the real interaction is built with clickable badges, linked cards, live demos, and guided visitor paths.</text>
</svg>
